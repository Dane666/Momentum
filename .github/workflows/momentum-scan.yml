name: momentum-scan

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_mode:
        description: Run smoke or full market scan
        required: true
        default: full
        type: choice
        options:
          - full
          - smoke
  schedule:
    - cron: "45 6 * * 1-5"

concurrency:
  group: momentum-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      MOMENTUM_LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Check China trading day
        id: calendar
        run: |
          python <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          import chinese_calendar as cc

          today = datetime.now(ZoneInfo("Asia/Shanghai")).date()
          is_open = cc.is_workday(today)

          print(f"Shanghai date: {today}, trading_day={is_open}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"is_open={str(is_open).lower()}\n")
          PY

      - name: Run unit tests
        run: python -m pytest tests/test_backtest.py tests/test_fetcher.py tests/test_fetcher_local_fallback.py -q

      - name: Run manual smoke scan
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'smoke'
        env:
          MOMENTUM_CODE_LIMIT: "20"
          MOMENTUM_MAX_IO_WORKERS: "6"
          MOMENTUM_ENABLE_FEISHU_NOTIFICATION: "true"
          MOMENTUM_LOG_FILE: scan_smoke.log
        run: python main.py --mode scan

      - name: Run full scan on push and manual full trigger
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'full')
        env:
          MOMENTUM_ENABLE_FEISHU_NOTIFICATION: "true"
          MOMENTUM_LOG_FILE: scan_full.log
        run: python main.py --mode scan

      - name: Run scheduled production scan
        if: github.event_name == 'schedule' && steps.calendar.outputs.is_open == 'true'
        env:
          MOMENTUM_ENABLE_FEISHU_NOTIFICATION: "true"
          MOMENTUM_LOG_FILE: scan_schedule.log
        run: python main.py --mode scan

      - name: Upload scan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: momentum-scan-logs
          path: |
            *.log
